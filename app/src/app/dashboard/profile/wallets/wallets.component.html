<div class="profile--wallets--header">
  <div class="profile--wallets--header--title">
    Mis carteras
  </div>
  <button
    type="button"
    class="create--wallet text-gray-500 hover:border-b-2 hover:text-blue-ribbon-500 hover:border-b-blue-ribbon-500"
    routerLink="/dashboard/wallets/new"
  >
    <i class="fa-solid fa-plus"></i>
    Nueva cartera
  </button>
</div>
<div class="profile--wallets--list">
  <ng-container *ngFor="let wallet of walletsInfo">
    <div class="profile--wallets--wallet grid grid-cols-6 text-gray-500 hover:border-b-2 hover:border-b-blue-ribbon-500">
      <div class="wallet--name text-white">
        Nombre:
        <span class="wallet--name__value text-gray-500"> {{ wallet.name }} </span>
      </div>
      <div class="wallet--values text-white">
        Valor:
        <span class="wallet--values__value text-gray-500"> {{ wallet.total | number: '1.3'}} </span>
      </div>
      <div class="wallet--assets text-white">
        Número de activos:
        <span class="wallet--assets__value text-gray-500"> {{ wallet.numberOfAssets }} </span>
      </div>
      <div class="wallet--settings">
        <div class="wallet--view hover:border-b-2 hover:text-blue-ribbon-500 hover:border-b-blue-ribbon-500 cursor-pointer">
          <i class="fa-solid fa-eye"></i>
          <div class="inline-flex items-center justify-center p-2 border-b-2 border-transparent rounded-t-lg">
            Ver cartera
          </div>
        </div>
        <div class="wallet--modify hover:border-b-2 hover:text-blue-ribbon-500 hover:border-b-blue-ribbon-500 cursor-pointer">
          <i class="fa-solid fa-wrench"></i>
          <div class="inline-flex items-center justify-center p-2 border-b-2 border-transparent rounded-t-lg">
            Modificar
          </div>
        </div>
        <div class="wallet--erase hover:border-b-2 hover:text-red-500 hover:border-b-red-500 cursor-pointer">
          <i class="fa-solid fa-trash"></i>
          <div class="inline-flex items-center justify-center p-2 border-b-2 border-transparent rounded-t-lg">
            Eliminar
          </div>
        </div>
      </div>
    </div>
  </ng-container>
</div>
