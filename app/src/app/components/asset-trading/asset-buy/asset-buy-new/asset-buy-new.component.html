<div class="asset--header text-xl text-white">
  <span class="text-xl text-white"> Nueva cartera </span>
  <ng-container *ngIf="showError">
    <span class="text-sm text-red-600">
      <i class="fa-solid fa-triangle-exclamation"></i>
      El coste excede al saldo actual
    </span>
  </ng-container>
</div>

<form class="asset--form" [formGroup]="buyNewForm" (ngSubmit)="onNewSubmit()">
  <div class="wallet--name">
    <label for="wallet">Cartera: </label>
    <input
      type="text"
      formControlName="wallet"
      class="asset--input text-sm text-white border-gray-600 focus:outline-none focus:ring-0 focus:border-blue-600 peer"
      placeholder=" "
    />
  </div>
  <div class="asset--amount">
    <label for="amount">Cantidad: </label>
    <input
      type="text"
      formControlName="amount"
      class="asset--input text-sm text-white border-gray-600 focus:outline-none focus:ring-0 focus:border-blue-600 peer"
      placeholder=" "
    />
  </div>
  <button
    type="submit"
    [disabled]="!buyNewForm.valid || isButtonDisabled"
    [ngClass]="{'hover:text-gray-600': isButtonDisabled || !buyNewForm.valid}"
    class="asset--form--button hover:text-blue-ribbon-500"
  >
    Comprar
  </button>
</form>
